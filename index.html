<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keychain</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
<script type="module">
  import * as THREE from 'https://esm.sh/three@0.165.0'
  import { GLTFLoader } from 'https://esm.sh/three@0.165.0/examples/jsm/loaders/GLTFLoader'

  const GLB = 'https://raw.githubusercontent.com/EzekielTeAwa/key_test_compressed.glb/main/Key_Test_compressed.glb'

  // Scene
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true })
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
  renderer.setSize(innerWidth, innerHeight)
  document.body.appendChild(renderer.domElement)

  const scene  = new THREE.Scene()
  const camera = new THREE.PerspectiveCamera(36, innerWidth / innerHeight, 0.01, 100)
  camera.position.z = 5

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 1.0))
  const sun = new THREE.DirectionalLight(0xffffff, 1.5)
  sun.position.set(3, 5, 4)
  scene.add(sun)
  const fill = new THREE.DirectionalLight(0xffffff, 0.5)
  fill.position.set(-3, -2, -3)
  scene.add(fill)

  // Model pivot
  const pivot = new THREE.Group()
  scene.add(pivot)

  new GLTFLoader().load(GLB, gltf => {
    const model = gltf.scene
    // Fit to screen
    const box    = new THREE.Box3().setFromObject(model)
    const size   = box.getSize(new THREE.Vector3())
    const centre = box.getCenter(new THREE.Vector3())
    const scale  = 3.5 / size.y
    model.scale.setScalar(scale)
    model.position.copy(centre.multiplyScalar(-scale))
    pivot.add(model)
  })

  // Drag + spring state
  let dragging = false, lastX = 0, velX = 0
  let rotY = 0, rotYSpring = 0, rotYVel = 0  // horizontal spin
  let wobble = 0, wobbleVel = 0               // Z wobble on flick
  let idle = 0

  const el = renderer.domElement

  el.addEventListener('pointerdown', e => {
    dragging = true; lastX = e.clientX; velX = 0
    el.setPointerCapture(e.pointerId)
  })

  el.addEventListener('pointermove', e => {
    if (!dragging) return
    const dx = e.clientX - lastX
    velX = dx
    rotY += dx * 0.6   // degrees
    lastX = e.clientX
  })

  el.addEventListener('pointerup', () => {
    // Flick: transfer drag velocity into wobble
    wobbleVel += velX * 0.08
    dragging = false
  })

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight
    camera.updateProjectionMatrix()
    renderer.setSize(innerWidth, innerHeight)
  })

  // Spring fn
  function spring(current, vel, target, tension, friction, dt) {
    vel += (target - current) * tension * dt
    vel *= Math.exp(-friction * dt)
    current += vel * dt
    return [current, vel]
  }

  const clock = new THREE.Clock()

  renderer.setAnimationLoop(() => {
    const dt = Math.min(clock.getDelta(), 0.05)

    // Idle sway
    if (!dragging) {
      idle += dt
      rotY += Math.sin(idle * 0.5) * 0.15
    }

    // Spring rotY toward 0 when not dragging (gentle return)
    ;[rotYSpring, rotYVel] = spring(rotYSpring, rotYVel, rotY * 0.15, 3, 3.5, dt)

    // Wobble spring back to 0
    ;[wobble, wobbleVel] = spring(wobble, wobbleVel, 0, 4, 3.2, dt)

    pivot.rotation.y = rotYSpring * (Math.PI / 180)
    pivot.rotation.z = wobble * (Math.PI / 180)

    renderer.render(scene, camera)
  })
</script>
</body>
</html>
