<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keychain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three'
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'

const GLB_URL = 'https://raw.githubusercontent.com/EzekielTeAwa/key_test_compressed.glb/main/Key_Test_compressed.glb'

// ── Scene setup ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true })
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.shadowMap.enabled = true
renderer.shadowMap.type = THREE.PCFSoftShadowMap
renderer.setClearColor(0x000000, 0) // transparent
document.body.appendChild(renderer.domElement)

const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.01, 100)
camera.position.set(0, 0, 0.6)

// ── Lighting ──────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.7)
scene.add(ambient)

const key = new THREE.DirectionalLight(0xffffff, 1.4)
key.position.set(2, 4, 3)
key.castShadow = true
scene.add(key)

const fill = new THREE.DirectionalLight(0xffffff, 0.4)
fill.position.set(-3, 2, -2)
scene.add(fill)

const rim = new THREE.DirectionalLight(0xffffff, 0.3)
rim.position.set(0, -3, -3)
scene.add(rim)

// ── Spring physics helper ─────────────────────────────────────────────────────
function makeSpring(tension, friction) {
  return { value: 0, velocity: 0, tension, friction }
}

function stepSpring(s, target, dt) {
  dt = Math.min(dt, 0.05)
  const force = (target - s.value) * s.tension
  s.velocity += force * dt
  s.velocity *= Math.pow(1 - s.friction, dt * 60)
  s.value += s.velocity * dt
  return s.value
}

// ── Groups & springs ──────────────────────────────────────────────────────────
const rootGroup    = new THREE.Group() // whole scene pivot
const carabinerGrp = new THREE.Group()
const ringGrp      = new THREE.Group()
const badgeGrp     = new THREE.Group()

scene.add(rootGroup)
rootGroup.add(carabinerGrp)
carabinerGrp.add(ringGrp)
ringGrp.add(badgeGrp)

// Springs: [rotZ, rotX]
const springs = {
  body:  { z: makeSpring(6,  0.55) },
  ring:  { z: makeSpring(10, 0.60), x: makeSpring(5, 0.60) },
  badge: { z: makeSpring(5,  0.45), x: makeSpring(3, 0.45) },
}

// Targets driven by drag
const target = { z: 0, x: 0 }

// ── Load GLB ──────────────────────────────────────────────────────────────────
const loader = new GLTFLoader()
let loaded = false

loader.load(GLB_URL, (gltf) => {
  const model = gltf.scene

  // Find named meshes
  let caribiner, ring, badge

  model.traverse((child) => {
    if (!child.isMesh) return
    child.castShadow = true
    child.receiveShadow = true
    const n = child.parent?.name || child.name
    if (n === 'Caribiner' || child.name === 'Caribiner') caribiner = child
    else if (n === 'Ring' || child.name === 'Ring') ring = child
    else if (n === 'badge_41' || child.name === 'badge_41') badge = child
  })

  // Fallback: if names not found, use traversal order
  if (!caribiner || !ring || !badge) {
    const meshes = []
    model.traverse(c => { if (c.isMesh) meshes.push(c) })
    caribiner = caribiner || meshes[0]
    ring       = ring      || meshes[1]
    badge      = badge     || meshes[2]
  }

  // Centre the whole model
  const box = new THREE.Box3().setFromObject(model)
  const centre = box.getCenter(new THREE.Vector3())
  const size   = box.getSize(new THREE.Vector3())
  const maxDim = Math.max(size.x, size.y, size.z)
  const scale  = 0.38 / maxDim
  model.scale.setScalar(scale)
  model.position.sub(centre.multiplyScalar(scale))

  // Re-compute after scale
  const box2 = new THREE.Box3().setFromObject(model)
  const top   = box2.max.y   // carabiner top
  const mid   = box2.getCenter(new THREE.Vector3()).y

  // Attach each part to its physics group
  // We clone the world matrix approach: just parent them
  if (caribiner) {
    caribiner.removeFromParent()
    carabinerGrp.add(caribiner)
    caribiner.scale.setScalar(scale)
    caribiner.position.sub(centre.clone().multiplyScalar(scale))
  }

  if (ring) {
    ring.removeFromParent()
    const ringOffset = ring.position.clone()
    ringGrp.position.y = -0.04  // hang below carabiner gate
    ringGrp.add(ring)
    ring.scale.setScalar(scale)
    ring.position.sub(centre.clone().multiplyScalar(scale))
  }

  if (badge) {
    badge.removeFromParent()
    badgeGrp.position.y = -0.07 // hang below ring
    badgeGrp.add(badge)
    badge.scale.setScalar(scale)
    badge.position.sub(centre.clone().multiplyScalar(scale))
  }

  // If fallback used (single combined mesh), just add whole model
  if (!gltf.scene.parent) {
    // nothing was re-parented, add whole model to carabinerGrp
    carabinerGrp.add(model)
  }

  loaded = true
}, undefined, (err) => {
  console.error('GLB load error:', err)
})

// ── Drag interaction ──────────────────────────────────────────────────────────
const drag = { active: false, lastX: 0, lastY: 0, velX: 0, velY: 0 }
const SENSITIVITY = 120 // degrees per pixel normalised

const canvas = renderer.domElement

canvas.addEventListener('pointerdown', (e) => {
  drag.active = true
  drag.lastX = e.clientX
  drag.lastY = e.clientY
  drag.velX = 0
  drag.velY = 0
  canvas.setPointerCapture(e.pointerId)
})

canvas.addEventListener('pointermove', (e) => {
  if (!drag.active) return
  const dx = e.clientX - drag.lastX
  const dy = e.clientY - drag.lastY
  drag.velX = dx
  drag.velY = dy
  drag.lastX = e.clientX
  drag.lastY = e.clientY
  target.z = Math.max(-38, Math.min(38, target.z + dx * (40 / window.innerWidth) * SENSITIVITY * 0.01))
  target.x = Math.max(-15, Math.min(15, target.x + dy * (20 / window.innerHeight) * SENSITIVITY * 0.01))
})

canvas.addEventListener('pointerup', (e) => {
  // Flick on release
  target.z = Math.max(-38, Math.min(38, target.z + drag.velX * 0.4))
  drag.active = false
})

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(window.innerWidth, window.innerHeight)
})

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
let idleTime = 0

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta()

  if (loaded) {
    // Idle sway
    if (!drag.active) {
      idleTime += dt
      const sway = Math.sin(idleTime * 0.6) * 2.5
      target.z += (sway - target.z) * 0.015
      target.x += (0   - target.x) * 0.03
    }

    const tz = target.z * (Math.PI / 180)
    const tx = target.x * (Math.PI / 180)

    // Step springs
    carabinerGrp.rotation.z = stepSpring(springs.body.z,  tz * 0.2,  dt)
    ringGrp.rotation.z      = stepSpring(springs.ring.z,  tz * 0.65, dt)
    ringGrp.rotation.x      = stepSpring(springs.ring.x,  tx * 0.4,  dt)
    badgeGrp.rotation.z     = stepSpring(springs.badge.z, tz * 1.0,  dt)
    badgeGrp.rotation.x     = stepSpring(springs.badge.x, tx * 0.85, dt)
  }

  renderer.render(scene, camera)
})
</script>
</body>
</html>
