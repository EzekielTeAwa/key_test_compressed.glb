<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keychain</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.165.0'
import { GLTFLoader } from 'https://esm.sh/three@0.165.0/examples/jsm/loaders/GLTFLoader'

const GLB = 'https://raw.githubusercontent.com/EzekielTeAwa/key_test_compressed.glb/main/Key_Test_2_compressed.glb'

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true })
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
renderer.setSize(innerWidth, innerHeight)
renderer.setClearColor(0x000000, 0)
document.body.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(36, innerWidth / innerHeight, 0.01, 100)
camera.position.z = 5

scene.add(new THREE.AmbientLight(0xffffff, 1.0))
const sun = new THREE.DirectionalLight(0xffffff, 1.6)
sun.position.set(3, 5, 4)
scene.add(sun)
const fill = new THREE.DirectionalLight(0xffffff, 0.4)
fill.position.set(-3, -2, -3)
scene.add(fill)

// ── Spring ────────────────────────────────────────────────────────────────────
function makeSpring(tension, damping) {
  return { val: 0, vel: 0, tension, damping }
}
function tickSpring(s, target, dt) {
  dt = Math.min(dt, 0.05)
  s.vel += (target - s.val) * s.tension * dt
  s.vel *= Math.exp(-s.damping * dt)
  s.val += s.vel * dt
  return s.val
}

// ── Objects to animate (set after load) ──────────────────────────────────────
let caribiner = null, ring = null, badge = null

// Each part gets Z and X springs with different stiffness
// Carabiner = stiffest, badge = loosest
const springs = {
  caribiner: { z: makeSpring(20, 9), x: makeSpring(20, 9) },
  ring:      { z: makeSpring(10, 6), x: makeSpring(10, 6) },
  badge:     { z: makeSpring( 4, 3), x: makeSpring( 4, 3) },
}

const tgt = { z: 0, x: 0 }

// ── Load ──────────────────────────────────────────────────────────────────────
new GLTFLoader().load(GLB, gltf => {
  const model = gltf.scene

  model.traverse(o => {
    if (o.isMesh) { o.castShadow = true; o.receiveShadow = true }
  })

  // Scale to fit
  const box    = new THREE.Box3().setFromObject(model)
  const size   = box.getSize(new THREE.Vector3())
  const centre = box.getCenter(new THREE.Vector3())
  const s      = 3.5 / size.y
  model.scale.setScalar(s)
  model.position.copy(centre.clone().multiplyScalar(-s))

  scene.add(model)

  // Find the 3 parts — leave them exactly where they are
  caribiner = model.getObjectByName('Caribiner')
  ring      = model.getObjectByName('Ring')
  badge     = model.getObjectByName('badge_41')

  console.log('Caribiner:', caribiner?.name, 'Ring:', ring?.name, 'Badge:', badge?.name)
})

// ── Drag ─────────────────────────────────────────────────────────────────────
const el = renderer.domElement
let dragging = false, lastX = 0, lastY = 0, velX = 0, velY = 0

el.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY
  velX = velY = 0
  el.setPointerCapture(e.pointerId)
})
el.addEventListener('pointermove', e => {
  if (!dragging) return
  velX = e.clientX - lastX
  velY = e.clientY - lastY
  lastX = e.clientX; lastY = e.clientY
  tgt.z = Math.max(-42, Math.min(42, tgt.z + velX * 0.28))
  tgt.x = Math.max(-18, Math.min(18, tgt.x + velY * 0.12))
})
el.addEventListener('pointerup', () => {
  tgt.z = Math.max(-42, Math.min(42, tgt.z + velX * 0.5))
  dragging = false
})

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

// ── Loop ──────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock()
let idle = 0

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta()

  if (!dragging) {
    idle += dt
    tgt.z += (Math.sin(idle * 0.55) * 2.5 - tgt.z) * 0.016
    tgt.x += (0 - tgt.x) * 0.03
  }

  const tz = tgt.z * (Math.PI / 180)
  const tx = tgt.x * (Math.PI / 180)

  // Rotate each part by a different spring amount
  // Carabiner barely moves, ring medium, badge most
  if (caribiner) {
    caribiner.rotation.z = tickSpring(springs.caribiner.z, tz * 0.1, dt)
    caribiner.rotation.x = tickSpring(springs.caribiner.x, tx * 0.1, dt)
  }
  if (ring) {
    ring.rotation.z = tickSpring(springs.ring.z, tz * 0.5, dt)
    ring.rotation.x = tickSpring(springs.ring.x, tx * 0.4, dt)
  }
  if (badge) {
    badge.rotation.z = tickSpring(springs.badge.z, tz * 1.0, dt)
    badge.rotation.x = tickSpring(springs.badge.x, tx * 0.85, dt)
  }

  renderer.render(scene, camera)
})
</script>
</body>
</html>
